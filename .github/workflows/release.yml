name: Release

on:
  push:
    tags:
      - "v*" # Dispara em qualquer tag v0.9.0, v1.0.0, etc.

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Black — verificar formatação
        run: black --check .

      - name: Flake8 — verificar qualidade
        run: flake8 .

  tests:
    name: Testes
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest
        run: pytest tests/ -v

  build:
    name: Build .deb
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm

      - name: Instalar rsync
        run: sudo apt-get install -y rsync

      - name: Extrair versão da tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .deb
        run: |
          chmod +x scripts/build_deb.sh
          ./scripts/build_deb.sh ${{ steps.version.outputs.VERSION }}

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "pkg-updater v${{ steps.version.outputs.VERSION }}"
          body: |
            ## pkg-updater v${{ steps.version.outputs.VERSION }}

            ### Instalacao

            wget https://github.com/Mickael-Virtuoso/PKG_UPDATER/releases/download/v${{ steps.version.outputs.VERSION }}/pkg-updater_${{ steps.version.outputs.VERSION }}_amd64.deb
            sudo dpkg -i pkg-updater_${{ steps.version.outputs.VERSION }}_amd64.deb

            ### Ativar execucao automatica

            systemctl --user enable --now pkg-updater.timer
          files: "dist/*.deb"
          draft: false
          prerelease: ${{ contains(github.ref, '0.9') }}
